<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SINTER | Vortex Hub</title>
    <style>
        :root {
            --bg: #050505;
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --text: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        #vortex-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; opacity: 0.4;
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 0.4rem;
            color: var(--cyan);
            text-shadow: 0 0 15px var(--cyan);
            margin-top: 40px;
        }

        .card {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--cyan);
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin: 10px 0;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            text-decoration: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn:active {
            background: var(--cyan);
            color: var(--bg);
        }

        #terminal {
            height: 200px;
            background: #000;
            border: 1px solid var(--magenta);
            margin-top: 20px;
            padding: 10px;
            font-size: 0.8rem;
            text-align: left;
            overflow-y: auto;
            color: var(--magenta);
        }

        .status-bar {
            font-size: 0.7rem;
            margin-top: 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <canvas id="vortex-canvas"></canvas>

    <div class="container">
        <h1>SINTER</h1>
        <p style="font-size: 0.8rem; opacity: 0.7;">[ 5TH REV HUB ]</p>

        <div class="card">
            <button class="btn" onclick="runPulse('SYNC')">Initiate Research Sync</button>
            <button class="btn" onclick="runPulse('AUTH')">Pulse Auth Portal</button>
            <button class="btn" onclick="location.href='https://github.com/yourusername/your-repo'">View Source (.flux)</button>
        </div>

        <div id="terminal">
            > SYSTEM_READY<br>
            > PHASE: STANDBY<br>
            > LATTICE: STABLE
        </div>

        <div class="status-bar">
            [Φ] VORTEX_MOBILE_CORE | [⌬] daleth: ONLINE
        </div>
    </div>

    <script>
        const canvas = document.getElementById('vortex-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawHex(x, y, s, a) {
            ctx.beginPath();
            ctx.strokeStyle = '#00ffff';
            ctx.globalAlpha = a;
            for(let i=0; i<6; i++) {
                ctx.lineTo(x + s * Math.cos(i * Math.PI/3), y + s * Math.sin(i * Math.PI/3));
            }
            ctx.closePath();
            ctx.stroke();
        }

        let t = 0;
        function anim() {
            ctx.clearRect(0,0,w,h);
            t += 0.02;
            for(let y=0; y<h+40; y+=40) {
                for(let x=0; x<w+40; x+=40) {
                    let d = Math.sqrt((x-w/2)**2 + (y-h/2)**2);
                    let a = 0.1 + 0.1 * Math.sin(d/100 - t);
                    drawHex(x + (Math.floor(y/40)%2)*20, y, 20, Math.max(0, a));
                }
            }
            requestAnimationFrame(anim);
        }
        anim();

        const term = document.getElementById('terminal');
        function log(msg) {
            term.innerHTML += `<br>> ${msg}`;
            term.scrollTop = term.scrollHeight;
        }

        function runPulse(type) {
            log(`INITIATING ${type}_PULSE...`);
            setTimeout(() => log("RESONATING AT 39.42 kHz..."), 500);
            setTimeout(() => log("PHASE-LOCK ESTABLISHED."), 1200);
            setTimeout(() => log(`${type} MANIFOLD SECURED.`), 1800);
        }
    </script>
</body>
</html>
